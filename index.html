<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Circles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #1a1a1a;
    border-right: 1px solid #2a2a2a;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  #sidebar h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 10px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .control-label {
    font-size: 12px;
    color: #aaa;
    flex: 1;
  }

  .control-value {
    font-size: 11px;
    color: #666;
    width: 36px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    outline: none;
    margin-top: 3px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .toggle {
    position: relative;
    width: 32px;
    height: 18px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-slider:before {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    left: 3px;
    top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle input:checked + .toggle-slider { background: #e85d2c; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(14px); }

  .color-swatches {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }

  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; }

  hr { border: none; border-top: 1px solid #2a2a2a; }

  /* ── Main canvas area ─────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  #card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    width: min(560px, 90vw);
    aspect-ratio: 16/10;
  }

  #c {
    display: block;
    width: 100%;
    height: 100%;
  }

  .card-label {
    position: absolute;
    bottom: 22px;
    left: 24px;
    pointer-events: none;
  }

  .card-label .top { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; }
  .card-label .title { font-size: 22px; font-weight: 700; color: #fff; margin-top: 2px; letter-spacing: -0.01em; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Hello Circles</h1>
  <hr>

  <div>
    <div class="section-title">Wave</div>

    <div class="control-row">
      <div class="control-label">Amplitude</div>
      <div class="control-value" id="val-amplitude">0.5</div>
    </div>
    <input type="range" id="amplitude" min="0" max="1" step="0.01" value="0.5">

    <br><br>

    <div class="control-row">
      <div class="control-label">Frequency</div>
      <div class="control-value" id="val-frequency">1.2</div>
    </div>
    <input type="range" id="frequency" min="0.1" max="4" step="0.05" value="1.2">

    <br><br>

    <div class="control-row">
      <div class="control-label">Rings</div>
      <div class="control-value" id="val-rings">18</div>
    </div>
    <input type="range" id="rings" min="4" max="40" step="1" value="18">

    <br><br>

    <div class="control-row">
      <div class="control-label">Dot Size</div>
      <div class="control-value" id="val-dotsize">1.8</div>
    </div>
    <input type="range" id="dotsize" min="0.5" max="4" step="0.1" value="1.8">
  </div>

  <hr>

  <div>
    <div class="section-title">Animation</div>
    <div class="toggle-row">
      <span class="control-label">Animated</span>
      <label class="toggle">
        <input type="checkbox" id="animated" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="control-row">
      <div class="control-label">Speed</div>
      <div class="control-value" id="val-speed">0.6</div>
    </div>
    <input type="range" id="speed" min="0.1" max="3" step="0.05" value="0.6">
  </div>

  <hr>

  <div>
    <div class="section-title">Color</div>
    <div class="color-swatches" id="swatches">
      <div class="swatch active" style="background:#c94a1e" data-bg="#c94a1e" data-dot="#f5c49a"></div>
      <div class="swatch" style="background:#1a4d8f" data-bg="#1a4d8f" data-dot="#7eb8f7"></div>
      <div class="swatch" style="background:#1d6b44" data-bg="#1d6b44" data-dot="#7de0a8"></div>
      <div class="swatch" style="background:#5a2d82" data-bg="#5a2d82" data-dot="#c89ff5"></div>
      <div class="swatch" style="background:#1a1a2e" data-bg="#1a1a2e" data-dot="#a0c4ff"></div>
      <div class="swatch" style="background:#7c1c1c" data-bg="#7c1c1c" data-dot="#f5b8b8"></div>
    </div>
  </div>
</div>

<!-- ── Card ──────────────────────────────────────── -->
<div id="main">
  <div id="card">
    <canvas id="c"></canvas>
    <div class="card-label">
      <div class="top">Interface Craft</div>
      <div class="title">Library Card</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const card  = document.getElementById("card");

// ── State ──────────────────────────────────────────
let state = {
  amplitude : 0.5,
  frequency : 1.2,
  rings     : 18,
  dotSize   : 1.8,
  speed     : 0.6,
  animated  : true,
  bgColor   : "#c94a1e",
  dotColor  : "#f5c49a",
};

let t = 0;
let raf;

// ── Resize ─────────────────────────────────────────
function resize() {
  const rect = card.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  draw();
}

// ── Draw ───────────────────────────────────────────
function draw() {
  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);

  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, W, H);

  const cx   = W / 2;
  const cy   = H / 2;
  const maxR = Math.min(W, H) * 0.48;
  const rings = state.rings;

  ctx.fillStyle = state.dotColor;

  for (let ring = 1; ring <= rings; ring++) {
    const r = (ring / rings) * maxR;
    // dots per ring scales with circumference
    const dots = Math.max(6, Math.round(2 * Math.PI * r / (maxR / rings) * 0.9));

    for (let d = 0; d < dots; d++) {
      const baseAngle = (d / dots) * Math.PI * 2;

      // wave distortion: radial displacement
      const wave = Math.sin(
        ring * state.frequency + d * (state.frequency * 0.25) + t
      ) * (maxR / rings) * state.amplitude * 1.4;

      const rr = r + wave;
      const x  = cx + Math.cos(baseAngle) * rr;
      const y  = cy + Math.sin(baseAngle) * rr;

      // dot size varies slightly with wave value for depth
      const sz = state.dotSize * (0.6 + 0.8 * ((wave / ((maxR / rings) * state.amplitude * 1.4 + 0.001) + 1) / 2));

      ctx.beginPath();
      ctx.arc(x, y, Math.max(0.3, sz), 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Animation loop ─────────────────────────────────
function loop() {
  if (state.animated) {
    t += 0.018 * state.speed;
    draw();
  }
  raf = requestAnimationFrame(loop);
}

// ── Controls ───────────────────────────────────────
function bind(id, key, display) {
  const el  = document.getElementById(id);
  const val = document.getElementById("val-" + id);
  el.addEventListener("input", () => {
    state[key] = parseFloat(el.value);
    if (val) val.textContent = el.value;
    if (!state.animated) draw();
  });
}

bind("amplitude", "amplitude");
bind("frequency",  "frequency");
bind("rings",      "rings");
bind("dotsize",    "dotSize");
bind("speed",      "speed");

document.getElementById("animated").addEventListener("change", e => {
  state.animated = e.target.checked;
  if (!state.animated) draw();
});

// Color swatches
document.getElementById("swatches").addEventListener("click", e => {
  const sw = e.target.closest(".swatch");
  if (!sw) return;
  document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
  sw.classList.add("active");
  state.bgColor  = sw.dataset.bg;
  state.dotColor = sw.dataset.dot;
  if (!state.animated) draw();
});

// ── Init ───────────────────────────────────────────
window.addEventListener("resize", resize);
resize();
loop();
</script>
</body>
</html>
