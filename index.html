<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello Circles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ─────────────────────────────────────── */
  #sidebar {
    width: 220px;
    min-width: 220px;
    background: #1a1a1a;
    border-right: 1px solid #2a2a2a;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  #sidebar h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 10px;
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .control-label {
    font-size: 12px;
    color: #aaa;
    flex: 1;
  }

  .control-value {
    font-size: 11px;
    color: #666;
    width: 36px;
    text-align: right;
  }

  .slider-wrap { margin-bottom: 12px; }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 3px;
    background: #333;
    border-radius: 2px;
    outline: none;
    margin-top: 4px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .toggle {
    position: relative;
    width: 32px;
    height: 18px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 9px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .toggle-slider:before {
    content: "";
    position: absolute;
    width: 12px;
    height: 12px;
    left: 3px;
    top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle input:checked + .toggle-slider { background: #e85d2c; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(14px); }

  /* Shape picker */
  .shape-picker {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .shape-btn {
    width: 34px;
    height: 34px;
    background: #2a2a2a;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }

  .shape-btn:hover { background: #333; }
  .shape-btn.active { border-color: #fff; background: #333; }

  .shape-btn svg { width: 16px; height: 16px; fill: #aaa; }
  .shape-btn.active svg { fill: #fff; }

  .color-swatches {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .swatch {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }

  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: #fff; }

  hr { border: none; border-top: 1px solid #2a2a2a; }

  /* ── Main canvas area ─────────────────────────────── */
  #main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }

  #card {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    width: min(560px, 90vw);
    aspect-ratio: 16/10;
    cursor: crosshair;
  }

  #c {
    display: block;
    width: 100%;
    height: 100%;
  }

  .card-label {
    position: absolute;
    bottom: 22px;
    left: 24px;
    pointer-events: none;
  }

  .card-label .top { font-size: 11px; color: rgba(255,255,255,0.55); letter-spacing: 0.06em; }
  .card-label .title { font-size: 22px; font-weight: 700; color: #fff; margin-top: 2px; letter-spacing: -0.01em; }

  /* Click-to-place hint */
  #hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #444;
    letter-spacing: 0.05em;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="sidebar">
  <h1>Hello Circles</h1>
  <hr>

  <!-- Wave -->
  <div>
    <div class="section-title">Wave</div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Amplitude</div>
        <div class="control-value" id="val-amplitude">0.5</div>
      </div>
      <input type="range" id="amplitude" min="0" max="1" step="0.01" value="0.5">
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Frequency</div>
        <div class="control-value" id="val-frequency">1.2</div>
      </div>
      <input type="range" id="frequency" min="0.1" max="4" step="0.05" value="1.2">
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Rings</div>
        <div class="control-value" id="val-rings">18</div>
      </div>
      <input type="range" id="rings" min="4" max="40" step="1" value="18">
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Dot Size</div>
        <div class="control-value" id="val-dotsize">1.8</div>
      </div>
      <input type="range" id="dotsize" min="0.5" max="4" step="0.1" value="1.8">
    </div>
  </div>

  <hr>

  <!-- Placement -->
  <div>
    <div class="section-title">Placement</div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Offset X</div>
        <div class="control-value" id="val-offsetx">0</div>
      </div>
      <input type="range" id="offsetx" min="-100" max="100" step="1" value="0">
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Offset Y</div>
        <div class="control-value" id="val-offsety">0</div>
      </div>
      <input type="range" id="offsety" min="-100" max="100" step="1" value="0">
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Scale</div>
        <div class="control-value" id="val-scale">1.0</div>
      </div>
      <input type="range" id="scale" min="0.2" max="2" step="0.05" value="1">
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Rotation</div>
        <div class="control-value" id="val-rotation">0°</div>
      </div>
      <input type="range" id="rotation" min="0" max="360" step="1" value="0">
    </div>
  </div>

  <hr>

  <!-- Dot Shape -->
  <div>
    <div class="section-title">Dot Shape</div>
    <div class="shape-picker" id="shapes">
      <div class="shape-btn active" data-shape="circle" title="Circle">
        <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/></svg>
      </div>
      <div class="shape-btn" data-shape="square" title="Square">
        <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="2"/></svg>
      </div>
      <div class="shape-btn" data-shape="diamond" title="Diamond">
        <svg viewBox="0 0 16 16"><polygon points="8,1 15,8 8,15 1,8"/></svg>
      </div>
      <div class="shape-btn" data-shape="triangle" title="Triangle">
        <svg viewBox="0 0 16 16"><polygon points="8,1 15,15 1,15"/></svg>
      </div>
      <div class="shape-btn" data-shape="cross" title="Cross">
        <svg viewBox="0 0 16 16"><rect x="6" y="1" width="4" height="14" rx="1"/><rect x="1" y="6" width="14" height="4" rx="1"/></svg>
      </div>
      <div class="shape-btn" data-shape="star" title="Star">
        <svg viewBox="0 0 16 16"><polygon points="8,1 10,6 15,6 11,9.5 12.5,15 8,12 3.5,15 5,9.5 1,6 6,6"/></svg>
      </div>
    </div>
  </div>

  <hr>

  <!-- Animation -->
  <div>
    <div class="section-title">Animation</div>
    <div class="toggle-row">
      <span class="control-label">Animated</span>
      <label class="toggle">
        <input type="checkbox" id="animated" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="slider-wrap">
      <div class="control-row">
        <div class="control-label">Speed</div>
        <div class="control-value" id="val-speed">0.6</div>
      </div>
      <input type="range" id="speed" min="0.1" max="3" step="0.05" value="0.6">
    </div>
  </div>

  <hr>

  <!-- Color -->
  <div>
    <div class="section-title">Color</div>
    <div class="color-swatches" id="swatches">
      <div class="swatch active" style="background:#c94a1e" data-bg="#c94a1e" data-dot="#f5c49a"></div>
      <div class="swatch" style="background:#1a4d8f" data-bg="#1a4d8f" data-dot="#7eb8f7"></div>
      <div class="swatch" style="background:#1d6b44" data-bg="#1d6b44" data-dot="#7de0a8"></div>
      <div class="swatch" style="background:#5a2d82" data-bg="#5a2d82" data-dot="#c89ff5"></div>
      <div class="swatch" style="background:#1a1a2e" data-bg="#1a1a2e" data-dot="#a0c4ff"></div>
      <div class="swatch" style="background:#7c1c1c" data-bg="#7c1c1c" data-dot="#f5b8b8"></div>
    </div>
  </div>
</div>

<!-- ── Card ──────────────────────────────────────── -->
<div id="main">
  <div id="card">
    <canvas id="c"></canvas>
    <div class="card-label">
      <div class="top">Interface Craft</div>
      <div class="title">Library Card</div>
    </div>
  </div>
  <div id="hint">Click card to reposition · Drag to move</div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");
const card   = document.getElementById("card");

// ── State ──────────────────────────────────────────
let state = {
  amplitude : 0.5,
  frequency : 1.2,
  rings     : 18,
  dotSize   : 1.8,
  speed     : 0.6,
  animated  : true,
  bgColor   : "#c94a1e",
  dotColor  : "#f5c49a",
  offsetX   : 0,
  offsetY   : 0,
  scale     : 1.0,
  rotation  : 0,
  shape     : "circle",
};

let t = 0;

// ── Resize ─────────────────────────────────────────
function resize() {
  const rect = card.getBoundingClientRect();
  const dpr  = window.devicePixelRatio || 1;
  canvas.width  = rect.width  * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  draw();
}

// ── Shape drawing ──────────────────────────────────
function drawDot(x, y, sz) {
  ctx.save();
  ctx.translate(x, y);
  const s = Math.max(0.3, sz);

  switch (state.shape) {
    case "circle":
      ctx.beginPath();
      ctx.arc(0, 0, s, 0, Math.PI * 2);
      ctx.fill();
      break;

    case "square":
      ctx.fillRect(-s, -s, s * 2, s * 2);
      break;

    case "diamond":
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.3);
      ctx.lineTo(s * 1.0, 0);
      ctx.lineTo(0,  s * 1.3);
      ctx.lineTo(-s * 1.0, 0);
      ctx.closePath();
      ctx.fill();
      break;

    case "triangle":
      ctx.beginPath();
      ctx.moveTo(0, -s * 1.3);
      ctx.lineTo(s * 1.2,  s * 0.9);
      ctx.lineTo(-s * 1.2, s * 0.9);
      ctx.closePath();
      ctx.fill();
      break;

    case "cross": {
      const t2 = s * 0.38;
      ctx.fillRect(-s, -t2, s * 2, t2 * 2);
      ctx.fillRect(-t2, -s, t2 * 2, s * 2);
      break;
    }

    case "star": {
      const outer = s * 1.3, inner = s * 0.55;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const oA = (i * 2 * Math.PI / 5) - Math.PI / 2;
        const iA = oA + Math.PI / 5;
        if (i === 0) ctx.moveTo(Math.cos(oA)*outer, Math.sin(oA)*outer);
        else ctx.lineTo(Math.cos(oA)*outer, Math.sin(oA)*outer);
        ctx.lineTo(Math.cos(iA)*inner, Math.sin(iA)*inner);
      }
      ctx.closePath();
      ctx.fill();
      break;
    }
  }
  ctx.restore();
}

// ── Draw ───────────────────────────────────────────
function draw() {
  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);

  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, W, H);

  // Apply placement: offset + rotation around the user-defined center
  const cx = W / 2 + state.offsetX;
  const cy = H / 2 + state.offsetY;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(state.rotation * Math.PI / 180);
  ctx.scale(state.scale, state.scale);

  const maxR  = Math.min(W, H) * 0.48;
  const rings = state.rings;

  ctx.fillStyle = state.dotColor;

  for (let ring = 1; ring <= rings; ring++) {
    const r = (ring / rings) * maxR;
    const dots = Math.max(6, Math.round(2 * Math.PI * r / (maxR / rings) * 0.9));

    for (let d = 0; d < dots; d++) {
      const baseAngle = (d / dots) * Math.PI * 2;

      const wave = Math.sin(
        ring * state.frequency + d * (state.frequency * 0.25) + t
      ) * (maxR / rings) * state.amplitude * 1.4;

      const rr = r + wave;
      const x  = Math.cos(baseAngle) * rr;
      const y  = Math.sin(baseAngle) * rr;

      const sz = state.dotSize * (0.6 + 0.8 * ((wave / ((maxR / rings) * state.amplitude * 1.4 + 0.001) + 1) / 2));

      drawDot(x, y, sz);
    }
  }

  ctx.restore();
}

// ── Animation loop ─────────────────────────────────
function loop() {
  if (state.animated) {
    t += 0.018 * state.speed;
    draw();
  }
  requestAnimationFrame(loop);
}

// ── Slider helper ──────────────────────────────────
function bind(id, key, transform) {
  const el  = document.getElementById(id);
  const val = document.getElementById("val-" + id);
  el.addEventListener("input", () => {
    const v = parseFloat(el.value);
    state[key] = transform ? transform(v) : v;
    if (val) val.textContent = id === "rotation" ? v + "°" : v;
    if (!state.animated) draw();
  });
}

bind("amplitude", "amplitude");
bind("frequency", "frequency");
bind("rings",     "rings");
bind("dotsize",   "dotSize");
bind("speed",     "speed");
bind("offsetx",   "offsetX");
bind("offsety",   "offsetY");
bind("scale",     "scale");
bind("rotation",  "rotation");

// ── Animated toggle ────────────────────────────────
document.getElementById("animated").addEventListener("change", e => {
  state.animated = e.target.checked;
  if (!state.animated) draw();
});

// ── Color swatches ─────────────────────────────────
document.getElementById("swatches").addEventListener("click", e => {
  const sw = e.target.closest(".swatch");
  if (!sw) return;
  document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
  sw.classList.add("active");
  state.bgColor  = sw.dataset.bg;
  state.dotColor = sw.dataset.dot;
  if (!state.animated) draw();
});

// ── Shape picker ───────────────────────────────────
document.getElementById("shapes").addEventListener("click", e => {
  const btn = e.target.closest(".shape-btn");
  if (!btn) return;
  document.querySelectorAll(".shape-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  state.shape = btn.dataset.shape;
  if (!state.animated) draw();
});

// ── Click / drag to reposition on card ────────────
let dragging = false;
let dragStart = null;
let offsetAtDrag = null;

card.addEventListener("mousedown", e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  offsetAtDrag = { x: state.offsetX, y: state.offsetY };
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;
  const rect = card.getBoundingClientRect();
  const scaleX = canvas.width  / (window.devicePixelRatio || 1) / rect.width;
  const scaleY = canvas.height / (window.devicePixelRatio || 1) / rect.height;
  const dx = (e.clientX - dragStart.x) * scaleX;
  const dy = (e.clientY - dragStart.y) * scaleY;
  state.offsetX = Math.round(offsetAtDrag.x + dx);
  state.offsetY = Math.round(offsetAtDrag.y + dy);
  // Sync sliders
  document.getElementById("offsetx").value = state.offsetX;
  document.getElementById("offsety").value = state.offsetY;
  document.getElementById("val-offsetx").textContent = state.offsetX;
  document.getElementById("val-offsety").textContent = state.offsetY;
  if (!state.animated) draw();
});

window.addEventListener("mouseup", () => { dragging = false; });

// ── Init ───────────────────────────────────────────
window.addEventListener("resize", resize);
resize();
loop();
</script>
</body>
</html>
